<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beyblade X – TV Rozpis</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --cyan: #00ffff;
    --red:  #ff2244;
    --gold: #ffd700;
    --bg:   #020609;
    --text: #c8e8f0;
    --dim:  #2a4a58;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: var(--bg);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
  }

  /* ── BG EFFECTS ── */
  .bg-glow {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background:
      radial-gradient(ellipse 80% 40% at 50% -10%, rgba(0,255,255,0.10) 0%, transparent 70%),
      radial-gradient(ellipse 60% 30% at 50% 110%, rgba(255,34,68,0.08) 0%, transparent 70%);
  }

  .bg-grid {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background-image:
      linear-gradient(rgba(0,255,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,255,0.03) 1px, transparent 1px);
    background-size: 60px 60px;
  }

  /* ── LAYOUT ── */
  .tv-wrap {
    position: fixed; inset: 0; z-index: 1;
    display: flex; flex-direction: column;
  }

  /* ── HEADER ── */
  header {
    flex-shrink: 0;
    text-align: center;
    padding: 28px clamp(16px, 4vw, 48px) 18px;
    border-bottom: 1px solid #0e1e28;
    background: linear-gradient(180deg, rgba(2,6,9,0.95) 80%, transparent);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 24px;
  }

  .header-left {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 2px;
  }

  .logo {
    font-family: 'Orbitron', monospace;
    font-size: clamp(32px, 5vw, 64px);
    font-weight: 900;
    letter-spacing: 8px;
    background: linear-gradient(90deg, var(--cyan), #ffffff, var(--red));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
  }

  .subtitle {
    font-size: clamp(11px, 1.2vw, 15px);
    letter-spacing: 6px;
    color: var(--dim);
    text-transform: uppercase;
  }

  /* ── REFRESH RING (vpravo v headeru) ── */
  .header-right {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }

  .ring-btn {
    position: relative; width: 56px; height: 56px;
    background: #0a1a22; border: none; border-radius: 50%; cursor: default;
    display: flex; align-items: center; justify-content: center; font-size: 22px;
    box-shadow: 0 0 14px rgba(0,255,255,0.2);
  }

  .ring-btn svg { position: absolute; inset: 0; width: 100%; height: 100%; transform: rotate(-90deg); }
  .ring-btn circle { fill: none; stroke: var(--cyan); stroke-width: 3; stroke-dasharray: 160; stroke-dashoffset: 160; }
  .ring-btn circle.anim { transition: stroke-dashoffset 30s linear; stroke-dashoffset: 0; }

  .refresh-label { font-size: 11px; color: var(--dim); letter-spacing: 2px; }

  #lastUpdate { font-size: 11px; color: var(--dim); letter-spacing: 1px; }

  /* ── SECTION TITLE ── */
  .section-bar {
    flex-shrink: 0;
    padding: 12px clamp(12px, 4vw, 48px) 10px;
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .section-title {
    font-family: 'Orbitron', monospace;
    font-size: clamp(10px, 1vw, 13px);
    color: var(--dim); letter-spacing: 5px;
  }

  .section-line { flex: 1; height: 1px; background: #0e1e28; }

  /* ── SCROLL VIEWPORT ── */
  .scroll-viewport {
    flex: 1;
    overflow: hidden;
    position: relative;
  }

  /* fade nahoře a dole pro plynulý přechod */
  .scroll-viewport::before,
  .scroll-viewport::after {
    content: ""; position: absolute; left: 0; right: 0; z-index: 5; pointer-events: none;
  }

  .scroll-viewport::before {
    top: 0; height: 40px;
    background: linear-gradient(180deg, var(--bg), transparent);
  }

  .scroll-viewport::after {
    bottom: 0; height: 60px;
    background: linear-gradient(0deg, var(--bg), transparent);
  }

  .scroll-track {
    padding: 10px clamp(12px, 4vw, 48px) 0;
    max-width: 1200px;
    margin: 0 auto;
  }

  /* ── MATCH CARDS ── */
  .match-card {
    background: linear-gradient(135deg, #080f18, #040b12);
    border: 1px solid #0e2030;
    border-radius: 18px;
    margin-bottom: 18px;
    overflow: hidden;
    transition: box-shadow .25s;
  }

  .match-card.highlight {
    border-color: var(--gold);
    box-shadow: 0 0 40px rgba(255,215,0,0.12);
  }

  .card-top { display: flex; align-items: stretch; }

  .player-block {
    flex: 1; min-width: 0;
    padding: clamp(14px, 2.5vh, 36px) clamp(14px, 3vw, 48px);
    display: flex; flex-direction: column; justify-content: center;
  }

  .player-block.left  { align-items: flex-start; }
  .player-block.right { align-items: flex-end; background: linear-gradient(135deg, transparent, rgba(255,34,68,0.05)); }

  .player-label {
    font-size: clamp(10px, 0.9vw, 13px);
    letter-spacing: 4px; color: var(--dim); margin-bottom: 6px; text-transform: uppercase;
  }

  .player-nick {
    font-family: 'Orbitron', monospace;
    font-size: clamp(14px, 3.2vw, 42px);
    font-weight: 700; letter-spacing: 2px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    max-width: 100%;
  }

  .player-block.left  .player-nick { color: var(--cyan); text-shadow: 0 0 20px rgba(0,255,255,0.4); }
  .player-block.right .player-nick { color: var(--red);  text-shadow: 0 0 20px rgba(255,34,68,0.4); }

  .vs-block {
    display: flex; align-items: center; justify-content: center;
    padding: 0 clamp(10px, 2vw, 32px);
    background: rgba(255,255,255,0.02);
    border-left: 1px solid #0e2030; border-right: 1px solid #0e2030;
    flex-shrink: 0;
  }

  .vs-text {
    font-family: 'Orbitron', monospace;
    font-size: clamp(12px, 1.4vw, 18px);
    color: var(--dim); letter-spacing: 4px;
  }

  .card-bottom {
    background: rgba(255,215,0,0.04);
    border-top: 1px solid rgba(255,215,0,0.1);
    padding: clamp(10px, 1.2vh, 18px) clamp(24px, 3vw, 48px);
    display: flex; align-items: center; justify-content: center; gap: 10px;
  }

  .arena-icon { font-size: clamp(14px, 1.4vw, 20px); }

  .arena-text {
    font-family: 'Orbitron', monospace;
    font-size: clamp(12px, 1.2vw, 17px);
    color: var(--gold); letter-spacing: 4px;
  }

  /* ── EMPTY / LOADING ── */
  .empty { text-align: center; padding: 80px 20px; color: var(--dim); }
  .empty .icon { font-size: 80px; margin-bottom: 20px; opacity: 0.3; }
  .empty .msg { font-family: 'Orbitron', monospace; font-size: 18px; letter-spacing: 4px; margin-bottom: 10px; }
  .empty .sub { font-size: 15px; letter-spacing: 2px; opacity: 0.6; }

  .loading-pulse { display: flex; justify-content: center; gap: 12px; padding: 80px; }
  .dot { width: 14px; height: 14px; border-radius: 50%; background: var(--cyan); animation: pulse 1.2s infinite; }
  .dot:nth-child(2) { animation-delay: .2s; }
  .dot:nth-child(3) { animation-delay: .4s; }

  @keyframes pulse {
    0%, 80%, 100% { opacity: .2; transform: scale(.8); }
    40%           { opacity: 1;  transform: scale(1); }
  }

  /* ── TICKER ── */
  .ticker-bar {
    flex-shrink: 0;
    background: #000;
    border-top: 1px solid #0e2030;
    padding: 10px 0;
    overflow: hidden;
  }

  .ticker-inner {
    display: inline-flex; gap: 80px; white-space: nowrap;
    animation: ticker 90s linear infinite;
    font-size: clamp(13px, 1.2vw, 16px);
    letter-spacing: 3px; color: var(--dim);
  }

  .ticker-inner span { color: var(--cyan); }

  @keyframes ticker {
    from { transform: translateX(100vw); }
    to   { transform: translateX(-100%); }
  }
</style>
</head>
<body>

<div class="bg-glow"></div>
<div class="bg-grid"></div>

<div class="tv-wrap">

  <!-- HEADER -->
  <header>
    <div class="header-left">
      <div class="logo">BEYBLADE X</div>
      <div class="subtitle">Rozpis zápasů</div>
    </div>
    <div class="header-right">
      <div class="ring-btn" id="ringBtn">
        ↻
        <svg viewBox="0 0 56 56">
          <circle id="progressCircle" cx="28" cy="28" r="25"></circle>
        </svg>
      </div>
      <div class="refresh-label">AUTO-REFRESH 30s</div>
      <div id="lastUpdate">–</div>
    </div>
  </header>

  <!-- SECTION BAR -->
  <div class="section-bar">
    <div class="section-line"></div>
    <div class="section-title">ČEKAJÍCÍ ZÁPASY</div>
    <div class="section-line"></div>
  </div>

  <!-- SCROLL VIEWPORT -->
  <div class="scroll-viewport" id="scrollViewport">
    <div class="scroll-track" id="scrollTrack">
      <div id="matchList">
        <div class="loading-pulse">
          <div class="dot"></div><div class="dot"></div><div class="dot"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- TICKER -->
  <div class="ticker-bar">
    <div class="ticker-inner" id="ticker">
      <span>BEYBLADE X TOURNAMENT</span> načítám zápasy…
    </div>
  </div>

</div>

<script>
// ══════════════════════════════════════════════
//  !! ZMĚŇ TUTO URL NA SVŮJ APPS SCRIPT URL !!
// ══════════════════════════════════════════════
const API = "https://script.google.com/macros/s/AKfycbzO8rgTmgJ55LUsDcP7lu2qXhA3Gt7IuLHYrjjiI06aHcxD2Lp7bP1gTcsNw3EtmgBt/exec"

let matches = []

// ── Načti zápasy ──────────────────────────────
async function loadMatches() {
  try {
    const res = await fetch(API + "?action=getMatches&t=" + Date.now())
    matches = await res.json()
    renderMatches()
    updateTicker()
    document.getElementById("lastUpdate").textContent =
      new Date().toLocaleTimeString("cs-CZ")
  } catch(e) {
    document.getElementById("matchList").innerHTML =
      `<div class="empty"><div class="icon">⚠️</div><div class="msg">CHYBA SPOJENÍ</div><div class="sub">Zkontroluj připojení</div></div>`
  }
}

// ── Vykresli zápasy ───────────────────────────
function renderMatches() {
  const list = document.getElementById("matchList")

  if (matches.length === 0) {
    list.innerHTML = `<div class="empty"><div class="icon">🏆</div><div class="msg">ŽÁDNÉ ČEKAJÍCÍ ZÁPASY</div><div class="sub">Všechny zápasy byly odehrány nebo ještě nebyly naplánovány</div></div>`
    stopAutoScroll()
    return
  }

  list.innerHTML = matches.map((m, i) => `
    <div class="match-card" style="animation-delay:${i * 0.08}s">
      <div class="card-top">
        <div class="player-block left">
          <div class="player-label">Hráč 1</div>
          <div class="player-nick">${m.player1}</div>
        </div>
        <div class="vs-block"><div class="vs-text">VS</div></div>
        <div class="player-block right">
          <div class="player-label">Hráč 2</div>
          <div class="player-nick">${m.player2}</div>
        </div>
      </div>
      <div class="card-bottom">
        <span class="arena-icon">🏟</span>
        <span class="arena-text">ARÉNA ${m.arena}</span>
      </div>
    </div>`
  ).join("")

  // nastav auto-scroll po vykreslení
  setTimeout(initAutoScroll, 400)
}

// ── Ticker ────────────────────────────────────
function updateTicker() {
  const t = document.getElementById("ticker")
  if (matches.length === 0) {
    t.innerHTML = `<span>BEYBLADE X TOURNAMENT</span> Žádné čekající zápasy`
    return
  }
  const items = matches.map(m =>
    `<span>⚡ ${m.player1}</span> vs <span>${m.player2}</span> — Aréna ${m.arena} &nbsp;&nbsp;`
  ).join("")
  t.innerHTML = items + items  // duplikát pro plynulou smyčku
}

// ── Auto-refresh s progress kruhem ────────────
const circle   = document.getElementById("progressCircle")
const INTERVAL = 30

function startRing() {
  circle.classList.remove("anim")
  void circle.offsetWidth
  circle.classList.add("anim")
}

setInterval(() => { loadMatches(); startRing() }, INTERVAL * 1000)

// ════════════════════════════════════════════════
//  AUTO-SCROLL
//  – pokud se vše vejde, nic nedělá
//  – jinak plynule scrolluje dolů, pak skočí zpět
// ════════════════════════════════════════════════
const SCROLL_PX_PER_SEC = 60  // rychlost scrollu (px/s) — uprav dle potřeby
const PAUSE_TOP_MS      = 2000 // pauza nahoře před spuštěním (ms)
const PAUSE_BOTTOM_MS   = 1500 // pauza dole před skokem zpět (ms)

let scrollRAF   = null
let scrollState = "idle"  // idle | pausing | scrolling | paused-bottom
let lastTS      = null
let pauseTimer  = null

function initAutoScroll() {
  const vp    = document.getElementById("scrollViewport")
  const track = document.getElementById("scrollTrack")

  stopAutoScroll()
  vp.scrollTop = 0

  const overflow = track.scrollHeight - vp.clientHeight
  if (overflow <= 0) return  // vše se vejde, scroll nepotřeba

  // pauza nahoře, pak spustit scroll
  scrollState = "pausing"
  pauseTimer = setTimeout(() => {
    scrollState = "scrolling"
    lastTS = null
    scrollRAF = requestAnimationFrame(scrollStep)
  }, PAUSE_TOP_MS)
}

function scrollStep(ts) {
  if (scrollState !== "scrolling") return

  const vp    = document.getElementById("scrollViewport")
  const track = document.getElementById("scrollTrack")

  if (lastTS === null) lastTS = ts
  const dt = (ts - lastTS) / 1000
  lastTS = ts

  const maxScroll = track.scrollHeight - vp.clientHeight
  vp.scrollTop += SCROLL_PX_PER_SEC * dt

  if (vp.scrollTop >= maxScroll - 2) {
    vp.scrollTop = maxScroll
    scrollState  = "paused-bottom"
    pauseTimer = setTimeout(() => {
      vp.scrollTop = 0
      scrollState  = "pausing"
      pauseTimer = setTimeout(() => {
        scrollState = "scrolling"
        lastTS = null
        scrollRAF = requestAnimationFrame(scrollStep)
      }, PAUSE_TOP_MS)
    }, PAUSE_BOTTOM_MS)
    return
  }

  scrollRAF = requestAnimationFrame(scrollStep)
}

function stopAutoScroll() {
  cancelAnimationFrame(scrollRAF)
  clearTimeout(pauseTimer)
  scrollState = "idle"
  scrollRAF = null
  lastTS    = null
}

// ── Init ──────────────────────────────────────
loadMatches()
startRing()
</script>
</body>
</html>

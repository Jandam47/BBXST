<!DOCTYPE html>
<html lang="cs">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beyblade X Score Ultimate</title>


<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#000000">

<link rel="icon" type="image/png" sizes="32x32" href="favicon.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon.png">

<style>
/* ===== GLOBAL FIXES ===== */
*{
  -webkit-user-select:none;
  -moz-user-select:none;
  -ms-user-select:none;
  user-select:none;
}

body{
  margin:0;
  font-family:Arial,sans-serif;
  background:black;
  color:white;
  display:flex;
  height:100vh;
  overflow:hidden;
}

/* ===== ENERGY ===== */
.energy{
  position:fixed;
  width:200%;
  height:200%;
  background:radial-gradient(circle,rgba(0,255,255,0.15),transparent 60%);
  animation:spin 20s linear infinite;
  pointer-events:none;
}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}

/* ===== TOP MENU ===== */
.topbar{
  position:fixed;
  top:0; left:0;
  width:100%;
  display:flex;
  justify-content:center;
  gap:10px;
  padding:10px;
  background:#000;
  transition:.3s;
  z-index:20;
}
.topbar.hidden{transform:translateY(-110%)}
.topbar button{
  font-size:20px;
  padding:10px 16px;
  border:none;
  border-radius:8px;
  background:#111;
  color:white;
  box-shadow:0 0 12px cyan;
}

/* ===== MENU TOGGLE ===== */
.menuToggle{
  position:fixed;
  right:20px;
  bottom:20px;
  font-size:26px;
  padding:14px 18px;
  border-radius:14px;
  background:#111;
  color:white;
  box-shadow:0 0 20px cyan;
  z-index:30;
}

/* ===== PLAYERS ===== */
.player{
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
  transition:box-shadow .2s;
}
.left{
  background:linear-gradient(135deg,#0f1b2a,#000);
  border-right:3px solid #333;
}
.right{
  background:linear-gradient(135deg,#2a0f0f,#000);
}
.left.active{box-shadow:inset 0 0 80px cyan}
.right.active{box-shadow:inset 0 0 80px red}

.score{
  font-size:150px;
  font-weight:bold;
  text-shadow:0 0 30px cyan;
  cursor:pointer;
}

/* ===== CENTER SCORE ===== */
.center{
  position:fixed;
  top:50%; left:50%;
  transform:translate(-50%,-50%);
  display:flex;
  flex-direction:column;
  gap:16px;
  z-index:10;
}

.dragBtn{
  font-size:42px;
  padding:26px 36px;
  border-radius:18px;
  background:#111;
  box-shadow:0 0 22px cyan;
  touch-action:none;
}
.dragBtn.active{box-shadow:0 0 45px red}

/* ===== DRAG HINT ARROWS ===== */
.dragWrapper{
  position:relative;
  display:flex;
  align-items:center;
  justify-content:center;
}

.arrow{
  position:absolute;
  font-size:90px;
  font-weight:bold;
  color:rgba(0,255,255,.35);
  text-shadow:0 0 30px cyan;
  pointer-events:none;
}

.leftArrow{
  left:-120px;
  animation:arrowLeft 1.6s infinite;
}

.rightArrow{
  right:-120px;
  animation:arrowRight 1.6s infinite;
}

@keyframes arrowLeft{
  0%{transform:translateX(0);opacity:.2}
  50%{transform:translateX(-30px);opacity:.7}
  100%{transform:translateX(0);opacity:.2}
}

@keyframes arrowRight{
  0%{transform:translateX(0);opacity:.2}
  50%{transform:translateX(30px);opacity:.7}
  100%{transform:translateX(0);opacity:.2}
}

.arrow.hidden{
  animation:fadeOut .4s forwards;
}

@keyframes fadeOut{
  to{opacity:0; transform:scale(.7)}
}

/* ===== RESET ===== */
.resetBtn{
  position:fixed;
  left:20px;
  bottom:20px;
  width:70px; height:70px;
  border-radius:50%;
  background:#300;
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:0 0 20px red;
  touch-action:none;
  z-index:25;
}

.screenReset{
  position:fixed;
  inset:0;
  pointer-events:none;
  box-shadow:inset 0 0 120px red;
  opacity:0;
  transition:.2s;
  z-index:40;
}
.screenReset.active{opacity:1}

/* ===== OVERLAY ===== */
.overlay{
  position:fixed;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:80px;
  font-weight:bold;
  background:rgba(0,0,0,.85);
  opacity:0;
  transition:.3s;
  z-index:100;
  pointer-events:none;
}
.overlay.show{opacity:1}
.win{color:#00ff9d;text-shadow:0 0 50px #00ff9d}
.xtreme{color:#ff3030;text-shadow:0 0 50px red}

/* ===== WAKE BUTTON STYLES ===== */
.wakeBtn{
  position:fixed;
  top:20px;
  right:20px;
  width:70px;
  height:70px;
  border-radius:50%;
  background:#111;
  color:white;
  font-size:26px;
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:0 0 20px cyan;
  z-index:35;
  touch-action:none;
  overflow:hidden;
  transition:top .3s, background 0.3s;
}

.wakeBtn svg{
  position:absolute;
  width:100%;
  height:100%;
  transform:rotate(-90deg);
}

.wakeBtn circle{
  fill:none;
  stroke:cyan;
  stroke-width:6;
  stroke-dasharray:188;
  stroke-dashoffset:188;
  transition:none;
}

.wakeBtn.cooldown{
  box-shadow:0 0 20px red;
}

/* ===== QR SCAN ===== */
.scanBtn{
  position:absolute;
  top:20px;
  width:70px;
  height:70px;
  border-radius:50%;
  background:#111;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:28px;
  box-shadow:0 0 20px cyan;
  z-index:15;

  opacity: 0;
  pointer-events: none;
  transform: scale(0.6);
  transition: opacity .3s, transform .3s;
}

.scanBtn.visible{
  opacity: 1;
  pointer-events: auto;
  transform: scale(1);
}

.playerInfo{
  position:absolute;
  top:20px;
  font-size:20px;
  max-width:45%;
  line-height:1.2;
}


.playerInfo.leftAlign{
  left:20px;
  text-align:left;
}


.playerInfo.rightAlign{
  right:20px;
  text-align:right;
}


.qrOverlay{
  position:fixed;
  inset:0;
  background:black;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  z-index:200;
}
.qrOverlay.hidden{display:none}
#qrReader{width:300px}

.scanBtn.hidden{
  opacity: 0;
  pointer-events: none;
  transform: scale(0.6);
  transition: opacity .2s, transform .2s;
}

</style>

<script src="https://unpkg.com/html5-qrcode"></script>

</head>

<body>

<div id="wakeBtn" class="wakeBtn">
  ⏰
  <svg>
    <circle cx="35" cy="35" r="30"></circle>
  </svg>
</div>

<div class="energy"></div>
<div id="screenReset" class="screenReset"></div>

<div id="topbar" class="topbar">
  <button onclick="toggleFullscreen()">FULLSCREEN</button>
  <button onclick="rotateScreen()">ROTATE</button>
  <button onclick="changeWin()">WIN: <span id="winScore">7</span></button>
  <button onclick="revert()">REVERT</button>
</div>

<button class="menuToggle" id="menuToggle">☰</button>


<div id="left" class="player left">
  <div class="scanBtn" onclick="scanPlayer(1)">📷</div>
 <div id="player1Info" class="playerInfo"></div>
  <div id="score1" class="score" onclick="subtractScore(1)">0</div>
</div>

<div class="center">
  <div class="dragBtn" data-points="3">+3</div>
  <div class="dragWrapper">
    <div class="arrow leftArrow">‹‹</div>
    <div class="dragBtn" data-points="2" id="hintBtn">+2</div>
    <div class="arrow rightArrow">››</div>
  </div>
  <div class="dragBtn" data-points="1">+1</div>
</div>

<div id="right" class="player right">
  <div class="scanBtn" onclick="scanPlayer(2)">📷</div>
  <div id="player2Info" class="playerInfo"></div>
  <div id="score2" class="score" onclick="subtractScore(2)">0</div>
</div>

<div class="resetBtn">RESET</div>
<div id="overlay" class="overlay"></div>

<script>
let score1=0,score2=0,winScore=7,history=[],isLandscape=false
let firstScoreUsed=false
let wakeActive = false; // Budík je na začátku neaktivní

let player1Name = ""
let player2Name = ""
let resultSent = false



const s1=document.getElementById("score1")
const s2=document.getElementById("score2")
const left=document.getElementById("left")
const right=document.getElementById("right")
const topbar=document.getElementById("topbar")
const resetScreen=document.getElementById("screenReset")
const overlay=document.getElementById("overlay")
const arrows=document.querySelectorAll(".arrow")
const wakeBtn = document.getElementById("wakeBtn")
const circle = wakeBtn.querySelector("circle")

function showText(t,c){
  overlay.innerText=t
  overlay.className="overlay show "+c
  setTimeout(()=>overlay.className="overlay",1200)
}

function addScore(p,pts){
  history.push({p,pts})
  if(!firstScoreUsed){
    firstScoreUsed=true
    arrows.forEach(a => a.classList.add("hidden"))
  }
  if(pts==3)showText("XTREME FINISH","xtreme")
  if(p==1){score1+=pts;s1.innerText=score1}
  if(p==2){score2+=pts;s2.innerText=score2}
  if(score1>=winScore)showText("LEFT WINS","win")
  if(score2>=winScore)showText("RIGHT WINS","win")

  // Spustí cooldown jen pokud byl budík už aktivován ručně
  if(pts > 0) startCooldown()
checkSendResultAvailability()
updateSendResultButton()
}

function subtractScore(p){
  if(p==1&&score1>0)addScore(1,-1)
  if(p==2&&score2>0)addScore(2,-1)
}

function revert(){
  let h=history.pop()
  if(!h)return
  h.p==1?(score1-=h.pts,s1.innerText=score1):(score2-=h.pts,s2.innerText=score2)
}
function resetPlayersInfo(){
  const p1 = document.getElementById("player1Info")
  const p2 = document.getElementById("player2Info")

  if(p1){
    p1.innerHTML = ""
    p1.className = "playerInfo"
  }

  if(p2){
    p2.innerHTML = ""
    p2.className = "playerInfo"
  }

  // znovu zobraz scan tlačítka
  document
    .querySelectorAll(".scanBtn")
    .forEach(btn => btn.classList.remove("hidden"))
}



function resetScore(){
  score1 = score2 = 0
  history = []
  firstScoreUsed = false

  resultSent = false      // ✅ KLÍČOVÁ OPRAVA

  s1.innerText = "0"
  s2.innerText = "0"
  arrows.forEach(a => a.classList.remove("hidden"))

  resetPlayersInfo()

  const btn = document.getElementById("sendResultBtn")
  btn.disabled = false
  btn.innerText = "✅ Odeslat výsledek"

  startCooldown()
  updateSendResultButton()
}


function toggleMenu(){
  topbar.classList.toggle("hidden")
  updateWakeBtnPosition()
}

async function toggleFullscreen(){
  if(!document.fullscreenElement){
    await document.documentElement.requestFullscreen()
    topbar.classList.add("hidden")
    try{ await screen.orientation.lock("landscape"); isLandscape=true }catch(e){}
  }else document.exitFullscreen()
}

async function rotateScreen(){
  if(!document.fullscreenElement)return alert("Jen ve fullscreen")
  await screen.orientation.lock(isLandscape?"portrait":"landscape")
  isLandscape=!isLandscape
}

/* ===== DRAG SCORE ===== */
document.querySelectorAll(".dragBtn").forEach(b=>{
  let sx=0,dx=0,d=false
  b.addEventListener("pointerdown",e=>{
    d=true; sx=e.clientX; b.classList.add("active")
  })
  b.addEventListener("pointermove",e=>{
    if(!d)return
    dx=e.clientX-sx
    b.style.transform=`translateX(${dx}px)`
    left.classList.toggle("active",dx<-80)
    right.classList.toggle("active",dx>80)
  })
  b.addEventListener("pointerup",()=>{
    b.style.transform=""
    b.classList.remove("active")
    left.classList.remove("active")
    right.classList.remove("active")
    if(dx<-120)addScore(1,+b.dataset.points)
    if(dx>120)addScore(2,+b.dataset.points)
    d=false;dx=0
  })
})

/* ===== DRAG RESET ===== */
const resetBtn=document.querySelector(".resetBtn")
let rx=0,ry=0,drag=false
resetBtn.addEventListener("pointerdown",e=>{drag=true;rx=e.clientX;ry=e.clientY})
resetBtn.addEventListener("pointermove",e=>{
  if(!drag)return
  let dx=e.clientX-rx,dy=e.clientY-ry
  resetBtn.style.transform=`translate(${dx}px,${dy}px)`
  resetScreen.classList.toggle("active",dx>80||dy<-80)
})
resetBtn.addEventListener("pointerup",()=>{
  resetBtn.style.transform=""
  if(resetScreen.classList.contains("active"))resetScore()
  resetScreen.classList.remove("active")
  drag=false
})

/* ===== WAKE BUTTON LOGIC ===== */
let cooldownTime = 30
let cooling = false
let holdTimer = null
let cooldownTimeout = null

wakeBtn.addEventListener("pointerdown", () => {
  holdTimer = setTimeout(() => {
    let val = prompt("Cooldown v sekundách:", cooldownTime)
    if(val !== null && !isNaN(val) && val > 0) cooldownTime = parseInt(val)
  }, 2500)
})

wakeBtn.addEventListener("pointerup", () => {
  clearTimeout(holdTimer)
  
  // PRVNÍ KLIKNUTÍ AKTIVUJE FUNKCI
  if(!wakeActive){
    wakeActive = true;
    wakeBtn.style.background = "#004444"; // Krátké bliknutí pro potvrzení
    setTimeout(() => wakeBtn.style.background = "#111", 300);
  }
  
  startCooldown()
})

wakeBtn.addEventListener("pointerleave", () => {
  clearTimeout(holdTimer)
})

function startCooldown(){
  // Pokud není funkce aktivovaná ručním kliknutím, nic neděláme
  if(!wakeActive) return;

  if(cooldownTimeout) clearTimeout(cooldownTimeout)

  cooling = true
  wakeBtn.classList.add("cooldown")

  circle.style.transition = "none"
  circle.style.strokeDashoffset = "188"

  setTimeout(() => {
    circle.style.transition = `stroke-dashoffset ${cooldownTime}s linear`
    circle.style.strokeDashoffset = "0"
  }, 50)

  cooldownTimeout = setTimeout(() => {
    cooling = false
    wakeBtn.classList.remove("cooldown")
    circle.style.transition = "none"
    circle.style.strokeDashoffset = "188"
  }, cooldownTime * 1000)
}

function updateWakeBtnPosition(){
  const isHidden = topbar.classList.contains("hidden")
  if(isHidden) wakeBtn.style.top = "20px"
  else wakeBtn.style.top = (topbar.offsetHeight + 10) + "px"
}

updateWakeBtnPosition()
window.addEventListener("resize", updateWakeBtnPosition)



function changeWin() {
  let newVal = prompt("Zadejte počet bodů pro vítězství:", winScore);
  if (newVal !== null && !isNaN(newVal) && newVal > 0) {
    winScore = parseInt(newVal);
    document.getElementById("winScore").innerText = winScore;
  }
}

function updateSendResultButton(){
  const btn = document.getElementById("sendResultBtn")
  const canSend =
    player1Name &&
    player2Name &&
    (score1 >= winScore || score2 >= winScore) &&
    resultSent === false

  if(canSend){
    btn.style.display = "block"
    btn.disabled = false
    btn.innerText = "✅ Odeslat výsledek"
  } else {
    btn.style.display = "none"
  }
}

  "%c BEYBLADE X %c Developed by Jandam47 ",
  "background: #00ffff; color: #000; font-weight: bold; border-radius: 4px 0 0 4px; padding: 2px 8px;",

/* ===== QR SCAN ===== */
let currentPlayer=null
let qrScanner=null
let scannedQRText=""

function scanPlayer(p){
  currentPlayer=p
  scannedQRText=""
  document.getElementById("qrResult").innerText="Naskenuj QR…"
  document.getElementById("qrOverlay").classList.remove("hidden")

  qrScanner=new Html5Qrcode("qrReader")
  qrScanner.start(
    {facingMode:"environment"},
    {fps:10,qrbox:250},
    txt=>{
      scannedQRText=txt
      document.getElementById("qrResult").innerText=txt
      qrScanner.stop()
    }
  )
}

function confirmQR(){
  if(!scannedQRText)return alert("Žádná data")
  parseQR(currentPlayer,scannedQRText)
  closeQR()
}

function parseQR(player,text){
  const nick=text.match(/Nick\s*[:\-]?\s*(.+)/i)
  const b1=text.match(/Beyblade 1\s*[:\-]?\s*(.+)/i)
  const b2=text.match(/Beyblade 2\s*[:\-]?\s*(.+)/i)
  const b3=text.match(/Beyblade 3\s*[:\-]?\s*(.+)/i)

  let html=""

  if(nick){
    html+=`<div><b>${nick[1]}</b></div>`
    if(player===1) player1Name = nick[1]
    if(player===2) player2Name = nick[1]
  }

  ;[b1,b2,b3].forEach(b=>{
    if(b){
      html+=`<div style="font-size:14px">${b[1]}</div>`
    }
  })

  const scanBtn = document.querySelector(
    player===1 ? "#left .scanBtn" : "#right .scanBtn"
  )
  if(scanBtn){
    scanBtn.classList.add("hidden")
  }

  const infoEl = document.getElementById(
    player===1 ? "player1Info" : "player2Info"
  )

  infoEl.className = "playerInfo " + (player===1 ? "leftAlign" : "rightAlign")
  infoEl.innerHTML = html

  updateSendResultButton()
}

function closeQR(){
  document.getElementById("qrOverlay").classList.add("hidden")
  if(qrScanner){qrScanner.stop().catch(()=>{});qrScanner=null}
}
``
const menuBtn = document.getElementById("menuToggle")
let menuHoldTimer = null
let scanVisible = false

menuBtn.addEventListener("pointerdown", () => {
  menuHoldTimer = setTimeout(() => {
    toggleScanButtons()
  }, 2500)
})

menuBtn.addEventListener("pointerup", () => {
  clearTimeout(menuHoldTimer)
  toggleMenu() // krátký klik = menu
})

menuBtn.addEventListener("pointerleave", () => {
  clearTimeout(menuHoldTimer)
})

function toggleScanButtons(){
  scanVisible = !scanVisible

  document.querySelectorAll(".scanBtn").forEach(btn => {
    if(scanVisible){
      btn.classList.add("visible")
    }else{
      btn.classList.remove("visible")
    }
  })
}


function checkSendResultAvailability(){
  const btn = document.getElementById("sendResultBtn")
  if(
    player1Name &&
    player2Name &&
    (score1 >= winScore || score2 >= winScore) &&
    !resultSent
  ){
    btn.style.display = "block"
  }
}


function sendResult(){
  const btn = document.getElementById("sendResultBtn")
  btn.disabled = true
  btn.innerText = "Odesílám…"

  const data = {
    player1: player1Name,
    score1: score1,
    player2: player2Name,
    score2: score2,
    time: new Date().toISOString()
  }

  fetch("https://script.google.com/macros/s/AKfycbzO8rgTmgJ55LUsDcP7lu2qXhA3Gt7IuLHYrjjiI06aHcxD2Lp7bP1gTcsNw3EtmgBt/exec", {
    method: "POST",
    mode: "no-cors",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      type: "result",
      ...data
    })
  })

  alert("✅ Výsledek byl úspěšně odeslán")
  resultSent = true
  btn.style.display = "none"
updateSendResultButton()
}


</script>

</div>

<button
  id="sendResultBtn"
  style="
    position:fixed;
    bottom:110px;
    left:50%;
    transform:translateX(-50%);
    font-size:20px;
    padding:14px 26px;
    border-radius:14px;
    background:#004400;
    color:white;
    box-shadow:0 0 25px #00ff9d;
    display:none;
    z-index:50;
  "
  onclick="sendResult()"

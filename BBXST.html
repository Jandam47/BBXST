<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beyblade X – Score Tracker</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#000000">
<link rel="icon" type="image/png" sizes="32x32" href="favicon.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/html5-qrcode"></script>

<style>
/* ===== RESET & BASE ===== */
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0; padding: 0;
  -webkit-user-select: none;
  user-select: none;
}

:root {
  --cyan:  #00ffff;
  --red:   #ff2244;
  --green: #00ff9d;
  --gold:  #ffd700;
  --bg:    #020609;
  --dim:   #2a4a58;
}

body {
  background: var(--bg);
  color: white;
  font-family: 'Rajdhani', sans-serif;
  display: flex;
  height: 100vh;
  overflow: hidden;
}

/* ===== BACKGROUND ===== */
.bg-energy {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  background:
    radial-gradient(ellipse 120% 80% at 0% 50%, rgba(0,255,255,0.07) 0%, transparent 55%),
    radial-gradient(ellipse 120% 80% at 100% 50%, rgba(255,34,68,0.07) 0%, transparent 55%);
  animation: breathe 8s ease-in-out infinite;
}

@keyframes breathe {
  0%, 100% { opacity: 0.6; }
  50%       { opacity: 1; }
}

/* ===== TOP MENU ===== */
.topbar {
  position: fixed;
  top: 0; left: 0;
  width: 100%;
  display: flex;
  justify-content: center;
  gap: 8px;
  padding: 10px;
  background: rgba(2,6,9,0.95);
  border-bottom: 1px solid #0e2a3a;
  backdrop-filter: blur(10px);
  transition: transform .3s;
  z-index: 20;
}

.topbar.hidden { transform: translateY(-110%); }

.topbar button {
  font-family: 'Orbitron', monospace;
  font-size: 11px;
  letter-spacing: 2px;
  padding: 10px 16px;
  border: 1px solid #0e2a3a;
  border-radius: 8px;
  background: #0a1520;
  color: var(--cyan);
  box-shadow: 0 0 10px rgba(0,255,255,0.15);
  cursor: pointer;
  transition: box-shadow .2s;
}

.topbar button:hover { box-shadow: 0 0 18px rgba(0,255,255,0.3); }

/* ===== MENU TOGGLE ===== */
.menuToggle {
  position: fixed;
  right: 20px;
  bottom: 20px;
  width: 56px; height: 56px;
  border-radius: 14px;
  background: #0a1520;
  color: var(--cyan);
  font-size: 22px;
  border: 1px solid #0e2a3a;
  box-shadow: 0 0 18px rgba(0,255,255,0.2);
  z-index: 30;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: box-shadow .2s;
}

.menuToggle:hover { box-shadow: 0 0 28px rgba(0,255,255,0.35); }

/* ===== PLAYER SIDES ===== */
.player {
  flex: 1;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: box-shadow .2s;
  z-index: 1;
}

.left {
  background: linear-gradient(135deg, #060f1a 0%, #020609 100%);
  border-right: 1px solid #0e2a3a;
}

.right {
  background: linear-gradient(225deg, #1a0608 0%, #020609 100%);
}

.left.active  { box-shadow: inset 0 0 100px rgba(0,255,255,0.2); }
.right.active { box-shadow: inset 0 0 100px rgba(255,34,68,0.2); }

/* ===== SCORE NUMBER ===== */
.score {
  font-family: 'Orbitron', monospace;
  font-size: clamp(100px, 18vw, 160px);
  font-weight: 900;
  cursor: pointer;
  letter-spacing: -4px;
  line-height: 1;
  transition: transform .1s;
}

.left  .score { color: var(--cyan); text-shadow: 0 0 40px rgba(0,255,255,0.5); }
.right .score { color: var(--red);  text-shadow: 0 0 40px rgba(255,34,68,0.5); }

.score:active { transform: scale(0.93); }

/* ===== PLAYER INFO (po QR scan) ===== */
.playerInfo {
  position: absolute;
  top: 16px;
  font-size: 16px;
  font-weight: 600;
  max-width: 42%;
  line-height: 1.3;
  z-index: 5;
}

.playerInfo .nick {
  font-family: 'Orbitron', monospace;
  font-size: 14px;
  letter-spacing: 2px;
}

.playerInfo.leftAlign  { left: 16px;  text-align: left; }
.playerInfo.rightAlign { right: 16px; text-align: right; }

.left  .playerInfo { color: var(--cyan); }
.right .playerInfo { color: var(--red); }

.playerInfo .bey {
  font-size: 12px;
  opacity: 0.6;
  letter-spacing: 1px;
}

/* ===== CENTER DRAG BUTTONS ===== */
.center {
  position: fixed;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  display: flex;
  flex-direction: column;
  gap: 12px;
  z-index: 10;
}

.dragBtn {
  font-family: 'Orbitron', monospace;
  font-size: 20px;
  font-weight: 700;
  letter-spacing: 2px;
  padding: 22px 32px;
  border-radius: 16px;
  background: #0a1520;
  border: 1px solid #0e2a3a;
  color: var(--cyan);
  box-shadow: 0 0 20px rgba(0,255,255,0.15);
  touch-action: none;
  cursor: grab;
  transition: box-shadow .2s;
  text-align: center;
}

.dragBtn:hover { box-shadow: 0 0 30px rgba(0,255,255,0.25); }
.dragBtn.active {
  box-shadow: 0 0 40px rgba(255,34,68,0.5);
  border-color: var(--red);
  color: white;
}

/* ===== DRAG ARROWS ===== */
.dragWrapper {
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
}

.arrow {
  position: absolute;
  font-size: 60px;
  font-weight: 900;
  color: rgba(0,255,255,0.25);
  pointer-events: none;
  line-height: 1;
}

.leftArrow  { left: -100px;  animation: arrowLeft  1.8s ease-in-out infinite; }
.rightArrow { right: -100px; animation: arrowRight 1.8s ease-in-out infinite; }

@keyframes arrowLeft {
  0%, 100% { transform: translateX(0);    opacity: .15; }
  50%       { transform: translateX(-20px); opacity: .6; }
}

@keyframes arrowRight {
  0%, 100% { transform: translateX(0);    opacity: .15; }
  50%       { transform: translateX(20px); opacity: .6; }
}

.arrow.hidden { animation: none; opacity: 0; transition: opacity .4s; }

/* ===== RESET BUTTON ===== */
.resetBtn {
  position: fixed;
  left: 20px;
  bottom: 20px;
  width: 64px; height: 64px;
  border-radius: 50%;
  background: #1a0608;
  border: 1px solid rgba(255,34,68,0.3);
  color: var(--red);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 1px;
  box-shadow: 0 0 18px rgba(255,34,68,0.25);
  touch-action: none;
  cursor: grab;
  z-index: 25;
  transition: box-shadow .2s;
}

.resetBtn .drag-label {
  font-family: 'Orbitron', monospace;
  font-size: 7px;
  font-weight: 700;
  letter-spacing: 1.5px;
  opacity: 0.55;
  line-height: 1;
}

.resetBtn .reset-label {
  font-family: 'Orbitron', monospace;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 2px;
  line-height: 1;
}

.screenReset {
  position: fixed;
  inset: 0;
  pointer-events: none;
  box-shadow: inset 0 0 150px rgba(255,34,68,0.4);
  opacity: 0;
  transition: opacity .2s;
  z-index: 40;
}

.screenReset.active { opacity: 1; }

/* ===== WAKE BUTTON ===== */
.wakeBtn {
  position: fixed;
  top: 20px; right: 20px;
  width: 56px; height: 56px;
  border-radius: 50%;
  background: #0a1520;
  border: 1px solid #0e2a3a;
  color: white;
  font-size: 22px;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 0 18px rgba(0,255,255,0.2);
  z-index: 35;
  touch-action: none;
  overflow: hidden;
  cursor: pointer;
  transition: top .3s, box-shadow .3s;
}

.wake-progress {
  position: absolute;
  width: 100%; height: 100%;
  transform: rotate(-90deg);
  top: 0; left: 0;
  pointer-events: none;
}

.wake-progress circle {
  fill: none;
  stroke: var(--cyan);
  stroke-width: 4;
  stroke-dasharray: 163;
  stroke-dashoffset: 163;
  transition: none;
}

.wakeBtn.cooldown { box-shadow: 0 0 20px rgba(255,34,68,0.4); border-color: rgba(255,34,68,0.3); }
.wakeBtn.active-wake { box-shadow: 0 0 24px rgba(0,255,255,0.4); }

/* ===== BEYBLADE SPINNER ===== */
.beyblade-icon {
  position: relative;
  z-index: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--cyan);
  opacity: 0.75;
  transition: opacity .3s;
}

.beyblade-svg {
  width: 30px;
  height: 30px;
  filter: drop-shadow(0 0 3px rgba(0,255,255,0.4));
}

.wakeBtn.active-wake .beyblade-icon {
  opacity: 1;
  color: var(--cyan);
}

.wakeBtn.cooldown .beyblade-icon {
  color: var(--red);
  filter: drop-shadow(0 0 6px rgba(255,34,68,0.6));
}

/* ===== QR SCAN BUTTON ===== */
.scanBtn {
  position: absolute;
  top: 16px;
  width: 56px; height: 56px;
  border-radius: 50%;
  background: #0a1520;
  border: 1px solid #0e2a3a;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  box-shadow: 0 0 16px rgba(0,255,255,0.15);
  z-index: 15;
  cursor: pointer;
  opacity: 0;
  pointer-events: none;
  transform: scale(0.6);
  transition: opacity .3s, transform .3s, box-shadow .2s;
}

.scanBtn:hover { box-shadow: 0 0 26px rgba(0,255,255,0.3); }
.scanBtn.visible { opacity: 1; pointer-events: auto; transform: scale(1); }
.scanBtn.hidden  { opacity: 0; pointer-events: none; transform: scale(0.6); }

#left  .scanBtn { left: 50%; transform-origin: center; }
#right .scanBtn { right: 50%; }

/* ===== QR OVERLAY ===== */
.qrOverlay {
  position: fixed;
  inset: 0;
  background: rgba(2,6,9,0.97);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  z-index: 200;
  backdrop-filter: blur(10px);
}

.qrOverlay.hidden { display: none; }

#qrReader { width: 300px; border-radius: 12px; overflow: hidden; }

.qrResult {
  font-family: 'Orbitron', monospace;
  font-size: 13px;
  letter-spacing: 2px;
  color: var(--cyan);
  text-align: center;
  max-width: 300px;
  word-break: break-all;
  min-height: 40px;
  padding: 10px;
  background: #0a1520;
  border: 1px solid #0e2a3a;
  border-radius: 8px;
  width: 300px;
}

.qr-source-tabs {
  display: flex;
  gap: 8px;
  margin-bottom: 4px;
}

.qr-tab {
  font-family: 'Orbitron', monospace;
  font-size: 10px;
  letter-spacing: 2px;
  padding: 8px 18px;
  border-radius: 8px;
  border: 1px solid rgba(0,255,255,0.2);
  background: #0a1520;
  color: rgba(0,255,255,0.4);
  cursor: pointer;
  transition: all .2s;
}

.qr-tab.active {
  color: var(--cyan);
  background: linear-gradient(135deg, #001a3a, #002a5a);
  box-shadow: 0 0 14px rgba(0,255,255,0.2);
}

.gallery-pick {
  font-family: 'Orbitron', monospace;
  font-size: 11px;
  letter-spacing: 2px;
  padding: 14px 28px;
  border-radius: 10px;
  border: 1px solid rgba(0,255,255,0.25);
  background: linear-gradient(135deg, #001a3a, #002a5a);
  color: var(--cyan);
  cursor: pointer;
  box-shadow: 0 0 14px rgba(0,255,255,0.15);
  transition: all .2s;
}

.gallery-pick:hover { box-shadow: 0 0 24px rgba(0,255,255,0.3); }
.gallery-pick.hidden { display: none; }

.qr-label {
  font-family: 'Orbitron', monospace;
  font-size: 14px;
  letter-spacing: 4px;
  color: var(--cyan);
  margin-bottom: 8px;
}

.qr-actions {
  display: flex;
  gap: 12px;
}
  font-size: 11px;
  letter-spacing: 2px;
  padding: 12px 24px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
  transition: all .2s;
}

.qr-btn {
  font-family: 'Orbitron', monospace;
  font-size: 11px;
  letter-spacing: 2px;
  padding: 12px 24px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
  transition: all .2s;
}

.qr-btn.confirm {
  background: linear-gradient(135deg, #001a3a, #002a5a);
  color: var(--cyan);
  border: 1px solid rgba(0,255,255,0.2);
  box-shadow: 0 0 14px rgba(0,255,255,0.15);
}

.qr-btn.cancel {
  background: #0a1520;
  color: var(--red);
  border: 1px solid rgba(255,34,68,0.2);
}

.qr-btn.cancel:hover { box-shadow: 0 0 14px rgba(255,34,68,0.2); }

/* ===== WIN OVERLAY ===== */
.overlay {
  position: fixed;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 8px;
  background: rgba(2,6,9,0.88);
  opacity: 0;
  transition: opacity .3s;
  z-index: 100;
  pointer-events: none;
}

.overlay.show { opacity: 1; }

.overlay-text {
  font-family: 'Orbitron', monospace;
  font-size: clamp(40px, 8vw, 72px);
  font-weight: 900;
  letter-spacing: 4px;
  text-align: center;
}

.win   .overlay-text { color: var(--green); text-shadow: 0 0 60px var(--green); }
.xtreme .overlay-text { color: var(--red);  text-shadow: 0 0 60px var(--red); }

/* ===== SEND RESULT BUTTON ===== */
.sendResultBtn {
  position: fixed;
  bottom: 90px;
  left: 50%;
  transform: translateX(-50%);
  font-family: 'Orbitron', monospace;
  font-size: 12px;
  letter-spacing: 2px;
  padding: 14px 28px;
  border-radius: 12px;
  background: linear-gradient(135deg, #001a0a, #002a12);
  color: var(--green);
  border: 1px solid rgba(0,255,157,0.25);
  box-shadow: 0 0 24px rgba(0,255,157,0.2);
  display: none;
  z-index: 50;
  cursor: pointer;
  transition: box-shadow .2s;
  white-space: nowrap;
}

.sendResultBtn:hover { box-shadow: 0 0 36px rgba(0,255,157,0.35); }
.sendResultBtn:disabled { opacity: 0.5; cursor: not-allowed; }
</style>
</head>
<body>

<!-- BACKGROUND -->
<div class="bg-energy"></div>
<div id="screenReset" class="screenReset"></div>

<!-- TOP MENU -->
<div id="topbar" class="topbar">
  <button onclick="toggleFullscreen()">⛶ FULL</button>
  <button onclick="rotateScreen()">⟳ ROTATE</button>
  <button onclick="changeWin()">WIN: <span id="winScore">7</span></button>
  <button onclick="revert()">↩ REVERT</button>
</div>

<!-- WAKE BUTTON -->
<div id="wakeBtn" class="wakeBtn">
  <div class="beyblade-icon">
    <svg class="beyblade-svg" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
      <!-- 4 swirling blades -->
      <path d="M20,20 L20,3 Q29,3 31,13 Q26,11 20,20Z" fill="currentColor"/>
      <path d="M20,20 L37,20 Q37,29 27,31 Q25,26 20,20Z" fill="currentColor"/>
      <path d="M20,20 L20,37 Q11,37 9,27 Q14,25 20,20Z" fill="currentColor"/>
      <path d="M20,20 L3,20 Q3,11 13,9 Q15,14 20,20Z" fill="currentColor"/>
      <!-- Outer ring -->
      <circle cx="20" cy="20" r="18" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.35"/>
      <!-- Inner ring -->
      <circle cx="20" cy="20" r="8" fill="none" stroke="currentColor" stroke-width="1" opacity="0.5"/>
      <!-- Center hub -->
      <circle cx="20" cy="20" r="4" fill="currentColor"/>
      <circle cx="20" cy="20" r="2" fill="#020609"/>
    </svg>
  </div>
  <svg class="wake-progress" viewBox="0 0 56 56">
    <circle cx="28" cy="28" r="26"></circle>
  </svg>
</div>

<!-- MENU TOGGLE -->
<button class="menuToggle" id="menuToggle">☰</button>

<!-- LEFT PLAYER -->
<div id="left" class="player left">
  <div class="scanBtn" id="scanBtn1" onclick="scanPlayer(1)">📷</div>
  <div id="player1Info" class="playerInfo"></div>
  <div id="score1" class="score" onclick="subtractScore(1)">0</div>
</div>

<!-- CENTER DRAG BUTTONS -->
<div class="center">
  <div class="dragBtn" data-points="3">+3 XTREME</div>
  <div class="dragWrapper">
    <div class="arrow leftArrow">‹</div>
    <div class="dragBtn" data-points="2" id="hintBtn">+2</div>
    <div class="arrow rightArrow">›</div>
  </div>
  <div class="dragBtn" data-points="1">+1</div>
</div>

<!-- RIGHT PLAYER -->
<div id="right" class="player right">
  <div class="scanBtn" id="scanBtn2" onclick="scanPlayer(2)">📷</div>
  <div id="player2Info" class="playerInfo"></div>
  <div id="score2" class="score" onclick="subtractScore(2)">0</div>
</div>

<!-- RESET BUTTON -->
<div class="resetBtn" id="resetBtn">
  <span class="drag-label">DRAG TO</span>
  <span class="reset-label">RESET</span>
</div>

<!-- WIN OVERLAY -->
<div id="overlay" class="overlay">
  <div class="overlay-text" id="overlayText"></div>
</div>

<!-- SEND RESULT BUTTON -->
<button class="sendResultBtn" id="sendResultBtn" onclick="sendResult()">
  ✓ ODESLAT VÝSLEDEK
</button>

<!-- QR OVERLAY -->
<div id="qrOverlay" class="qrOverlay hidden">
  <div class="qr-label">📷 SKENOVÁNÍ QR</div>

  <!-- Přepínač: kamera / galerie -->
  <div class="qr-source-tabs">
    <button class="qr-tab active" id="tabCamera" onclick="switchQRTab('camera')">KAMERA</button>
    <button class="qr-tab"        id="tabGallery" onclick="switchQRTab('gallery')">ZE ZAŘÍZENÍ</button>
  </div>

  <div id="qrReader"></div>

  <!-- skrytý file input pro galerii -->
  <input type="file" id="qrFileInput" accept="image/*" style="display:none" onchange="handleQRFile(event)">
  <button class="qr-btn gallery-pick hidden" id="galleryPickBtn" onclick="document.getElementById('qrFileInput').click()">
    📁 VYBRAT OBRÁZEK
  </button>

  <div id="qrResult" class="qrResult">Naskenuj QR kód hráče…</div>
  <div class="qr-actions">
    <button class="qr-btn confirm" onclick="confirmQR()">✓ POTVRDIT</button>
    <button class="qr-btn cancel"  onclick="closeQR()">✕ ZAVŘÍT</button>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════
const API = "https://script.google.com/macros/s/AKfycbzO8rgTmgJ55LUsDcP7lu2qXhA3Gt7IuLHYrjjiI06aHcxD2Lp7bP1gTcsNw3EtmgBt/exec"
// ═══════════════════════════════════════════════

/* ── STATE ── */
let score1 = 0, score2 = 0, winScore = 7
let history = []
let firstScoreUsed = false
let player1Name = "", player2Name = ""
let resultSent = false
let isLandscape = false
let wakeActive = false
let cooldownTime = 30
let cooldownTimeout = null
let holdTimer = null

/* ── ELEMENTS ── */
const s1          = document.getElementById("score1")
const s2          = document.getElementById("score2")
const left        = document.getElementById("left")
const right       = document.getElementById("right")
const topbar      = document.getElementById("topbar")
const resetScreen = document.getElementById("screenReset")
const overlay     = document.getElementById("overlay")
const overlayText = document.getElementById("overlayText")
const wakeBtn     = document.getElementById("wakeBtn")
const circle      = wakeBtn.querySelector(".wake-progress circle")
const resetBtn    = document.getElementById("resetBtn")

/* ══════════════════════════════════════════════
   SCORE
══════════════════════════════════════════════ */
function addScore(p, pts) {
  history.push({ p, pts })

  if (!firstScoreUsed) {
    firstScoreUsed = true
    document.querySelectorAll(".arrow").forEach(a => a.classList.add("hidden"))
  }

  if (p === 1) { score1 += pts; s1.innerText = score1 }
  if (p === 2) { score2 += pts; s2.innerText = score2 }

  if (pts === 3) showOverlay("XTREME FINISH", "xtreme")
  if (score1 >= winScore) showOverlay(player1Name ? player1Name + " WINS" : "LEVÝ VÍTĚZ", "win")
  if (score2 >= winScore) showOverlay(player2Name ? player2Name + " WINS" : "PRAVÝ VÍTĚZ", "win")

  if (pts > 0) startCooldown()
  updateSendResultButton()
}

function subtractScore(p) {
  if (p === 1 && score1 > 0) addScore(1, -1)
  if (p === 2 && score2 > 0) addScore(2, -1)
}

function revert() {
  const h = history.pop()
  if (!h) return
  if (h.p === 1) { score1 -= h.pts; s1.innerText = score1 }
  if (h.p === 2) { score2 -= h.pts; s2.innerText = score2 }
}

function changeWin() {
  const val = prompt("Počet bodů pro vítězství:", winScore)
  if (val !== null && !isNaN(val) && val > 0) {
    winScore = parseInt(val)
    document.getElementById("winScore").innerText = winScore
  }
}

/* ══════════════════════════════════════════════
   OVERLAY
══════════════════════════════════════════════ */
function showOverlay(text, cls) {
  overlayText.innerText = text
  overlay.className = "overlay show " + cls
  setTimeout(() => overlay.className = "overlay", 1400)
}

/* ══════════════════════════════════════════════
   RESET
══════════════════════════════════════════════ */
function resetScore() {
  score1 = score2 = 0
  history = []
  firstScoreUsed = false
  resultSent = false

  s1.innerText = "0"
  s2.innerText = "0"

  document.querySelectorAll(".arrow").forEach(a => a.classList.remove("hidden"))
  resetPlayersInfo()
  startCooldown()
  updateSendResultButton()
}

function resetPlayersInfo() {
  player1Name = ""
  player2Name = ""

  ;["player1Info", "player2Info"].forEach(id => {
    const el = document.getElementById(id)
    el.innerHTML = ""
    el.className = "playerInfo"
  })

  document.querySelectorAll(".scanBtn").forEach(btn => {
    btn.classList.remove("hidden")
  })
}

/* DRAG RESET *  font-family: 'Rajdhani', sans-serif;
  display: flex;
  height: 100vh;
  overflow: hidden;
}

/* ===== BACKGROUND ===== */
.bg-energy {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  background:
    radial-gradient(ellipse 120% 80% at 0% 50%, rgba(0,255,255,0.07) 0%, transparent 55%),
    radial-gradient(ellipse 120% 80% at 100% 50%, rgba(255,34,68,0.07) 0%, transparent 55%);
  animation: breathe 8s ease-in-out infinite;
}

@keyframes breathe {
  0%, 100% { opacity: 0.6; }
  50%       { opacity: 1; }
}

/* ===== TOP MENU ===== */
.topbar {
  position: fixed;
  top: 0; left: 0;
  width: 100%;
  display: flex;
  justify-content: center;
  gap: 8px;
  padding: 10px;
  background: rgba(2,6,9,0.95);
  border-bottom: 1px solid #0e2a3a;
  backdrop-filter: blur(10px);
  transition: transform .3s;
  z-index: 20;
}

.topbar.hidden { transform: translateY(-110%); }

.topbar button {
  font-family: 'Orbitron', monospace;
  font-size: 11px;
  letter-spacing: 2px;
  padding: 10px 16px;
  border: 1px solid #0e2a3a;
  border-radius: 8px;
  background: #0a1520;
  color: var(--cyan);
  box-shadow: 0 0 10px rgba(0,255,255,0.15);
  cursor: pointer;
  transition: box-shadow .2s;
}

.topbar button:hover { box-shadow: 0 0 18px rgba(0,255,255,0.3); }

/* ===== MENU TOGGLE ===== */
.menuToggle {
  position: fixed;
  right: 20px;
  bottom: 20px;
  width: 56px; height: 56px;
  border-radius: 14px;
  background: #0a1520;
  color: var(--cyan);
  font-size: 22px;
  border: 1px solid #0e2a3a;
  box-shadow: 0 0 18px rgba(0,255,255,0.2);
  z-index: 30;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: box-shadow .2s;
}

.menuToggle:hover { box-shadow: 0 0 28px rgba(0,255,255,0.35); }

/* ===== PLAYER SIDES ===== */
.player {
  flex: 1;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: box-shadow .2s;
  z-index: 1;
}

.left {
  background: linear-gradient(135deg, #060f1a 0%, #020609 100%);
  border-right: 1px solid #0e2a3a;
}

.right {
  background: linear-gradient(225deg, #1a0608 0%, #020609 100%);
}

.left.active  { box-shadow: inset 0 0 100px rgba(0,255,255,0.2); }
.right.active { box-shadow: inset 0 0 100px rgba(255,34,68,0.2); }

/* ===== SCORE NUMBER ===== */
.score {
  font-family: 'Orbitron', monospace;
  font-size: clamp(100px, 18vw, 160px);
  font-weight: 900;
  cursor: pointer;
  letter-spacing: -4px;
  line-height: 1;
  transition: transform .1s;
}

.left  .score { color: var(--cyan); text-shadow: 0 0 40px rgba(0,255,255,0.5); }
.right .score { color: var(--red);  text-shadow: 0 0 40px rgba(255,34,68,0.5); }

.score:active { transform: scale(0.93); }

/* ===== PLAYER INFO (po QR scan) ===== */
.playerInfo {
  position: absolute;
  top: 16px;
  font-size: 16px;
  font-weight: 600;
  max-width: 42%;
  line-height: 1.3;
  z-index: 5;
}

.playerInfo .nick {
  font-family: 'Orbitron', monospace;
  font-size: 14px;
  letter-spacing: 2px;
}

.playerInfo.leftAlign  { left: 16px;  text-align: left; }
.playerInfo.rightAlign { right: 16px; text-align: right; }

.left  .playerInfo { color: var(--cyan); }
.right .playerInfo { color: var(--red); }

.playerInfo .bey {
  font-size: 12px;
  opacity: 0.6;
  letter-spacing: 1px;
}

/* ===== CENTER DRAG BUTTONS ===== */
.center {
  position: fixed;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  display: flex;
  flex-direction: column;
  gap: 12px;
  z-index: 10;
}

.dragBtn {
  font-family: 'Orbitron', monospace;
  font-size: 20px;
  font-weight: 700;
  letter-spacing: 2px;
  padding: 22px 32px;
  border-radius: 16px;
  background: #0a1520;
  border: 1px solid #0e2a3a;
  color: var(--cyan);
  box-shadow: 0 0 20px rgba(0,255,255,0.15);
  touch-action: none;
  cursor: grab;
  transition: box-shadow .2s;
  text-align: center;
}

.dragBtn:hover { box-shadow: 0 0 30px rgba(0,255,255,0.25); }
.dragBtn.active {
  box-shadow: 0 0 40px rgba(255,34,68,0.5);
  border-color: var(--red);
  color: white;
}

/* ===== DRAG ARROWS ===== */
.dragWrapper {
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
}

.arrow {
  position: absolute;
  font-size: 60px;
  font-weight: 900;
  color: rgba(0,255,255,0.25);
  pointer-events: none;
  line-height: 1;
}

.leftArrow  { left: -100px;  animation: arrowLeft  1.8s ease-in-out infinite; }
.rightArrow { right: -100px; animation: arrowRight 1.8s ease-in-out infinite; }

@keyframes arrowLeft {
  0%, 100% { transform: translateX(0);    opacity: .15; }
  50%       { transform: translateX(-20px); opacity: .6; }
}

@keyframes arrowRight {
  0%, 100% { transform: translateX(0);    opacity: .15; }
  50%       { transform: translateX(20px); opacity: .6; }
}

.arrow.hidden { animation: none; opacity: 0; transition: opacity .4s; }

/* ===== RESET BUTTON ===== */
.resetBtn {
  position: fixed;
  left: 20px;
  bottom: 20px;
  width: 56px; height: 56px;
  border-radius: 50%;
  background: #1a0608;
  border: 1px solid rgba(255,34,68,0.3);
  color: var(--red);
  font-size: 22px;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 0 18px rgba(255,34,68,0.25);
  touch-action: none;
  cursor: grab;
  z-index: 25;
  transition: box-shadow .2s;
}

.screenReset {
  position: fixed;
  inset: 0;
  pointer-events: none;
  box-shadow: inset 0 0 150px rgba(255,34,68,0.4);
  opacity: 0;
  transition: opacity .2s;
  z-index: 40;
}

.screenReset.active { opacity: 1; }

/* ===== WAKE BUTTON ===== */
.wakeBtn {
  position: fixed;
  top: 20px; right: 20px;
  width: 56px; height: 56px;
  border-radius: 50%;
  background: #0a1520;
  border: 1px solid #0e2a3a;
  color: white;
  font-size: 22px;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 0 18px rgba(0,255,255,0.2);
  z-index: 35;
  touch-action: none;
  overflow: hidden;
  cursor: pointer;
  transition: top .3s, box-shadow .3s;
}

.wakeBtn svg {
  position: absolute;
  width: 100%; height: 100%;
  transform: rotate(-90deg);
}

.wakeBtn circle {
  fill: none;
  stroke: var(--cyan);
  stroke-width: 4;
  stroke-dasharray: 163;
  stroke-dashoffset: 163;
  transition: none;
}

.wakeBtn.cooldown { box-shadow: 0 0 20px rgba(255,34,68,0.4); border-color: rgba(255,34,68,0.3); }
.wakeBtn.active-wake { box-shadow: 0 0 24px rgba(0,255,255,0.4); }

/* ===== QR SCAN BUTTON ===== */
.scanBtn {
  position: absolute;
  top: 16px;
  width: 56px; height: 56px;
  border-radius: 50%;
  background: #0a1520;
  border: 1px solid #0e2a3a;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  box-shadow: 0 0 16px rgba(0,255,255,0.15);
  z-index: 15;
  cursor: pointer;
  opacity: 0;
  pointer-events: none;
  transform: scale(0.6);
  transition: opacity .3s, transform .3s, box-shadow .2s;
}

.scanBtn:hover { box-shadow: 0 0 26px rgba(0,255,255,0.3); }
.scanBtn.visible { opacity: 1; pointer-events: auto; transform: scale(1); }
.scanBtn.hidden  { opacity: 0; pointer-events: none; transform: scale(0.6); }

#left  .scanBtn { left: 50%; transform-origin: center; }
#right .scanBtn { right: 50%; }

/* ===== QR OVERLAY ===== */
.qrOverlay {
  position: fixed;
  inset: 0;
  background: rgba(2,6,9,0.97);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  z-index: 200;
  backdrop-filter: blur(10px);
}

.qrOverlay.hidden { display: none; }

#qrReader { width: 300px; border-radius: 12px; overflow: hidden; }

.qrResult {
  font-family: 'Orbitron', monospace;
  font-size: 13px;
  letter-spacing: 2px;
  color: var(--cyan);
  text-align: center;
  max-width: 300px;
  word-break: break-all;
  min-height: 40px;
  padding: 10px;
  background: #0a1520;
  border: 1px solid #0e2a3a;
  border-radius: 8px;
  width: 300px;
}

.qr-label {
  font-family: 'Orbitron', monospace;
  font-size: 14px;
  letter-spacing: 4px;
  color: var(--cyan);
  margin-bottom: 8px;
}

.qr-actions {
  display: flex;
  gap: 12px;
}

.qr-btn {
  font-family: 'Orbitron', monospace;
  font-size: 11px;
  letter-spacing: 2px;
  padding: 12px 24px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
  transition: all .2s;
}

.qr-btn.confirm {
  background: linear-gradient(135deg, #001a3a, #002a5a);
  color: var(--cyan);
  border: 1px solid rgba(0,255,255,0.2);
  box-shadow: 0 0 14px rgba(0,255,255,0.15);
}

.qr-btn.confirm:hover { box-shadow: 0 0 24px rgba(0,255,255,0.3); }

.qr-btn.cancel {
  background: #0a1520;
  color: var(--red);
  border: 1px solid rgba(255,34,68,0.2);
}

.qr-btn.cancel:hover { box-shadow: 0 0 14px rgba(255,34,68,0.2); }

/* ===== WIN OVERLAY ===== */
.overlay {
  position: fixed;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 8px;
  background: rgba(2,6,9,0.88);
  opacity: 0;
  transition: opacity .3s;
  z-index: 100;
  pointer-events: none;
}

.overlay.show { opacity: 1; }

.overlay-text {
  font-family: 'Orbitron', monospace;
  font-size: clamp(40px, 8vw, 72px);
  font-weight: 900;
  letter-spacing: 4px;
  text-align: center;
}

.win   .overlay-text { color: var(--green); text-shadow: 0 0 60px var(--green); }
.xtreme .overlay-text { color: var(--red);  text-shadow: 0 0 60px var(--red); }

/* ===== SEND RESULT BUTTON ===== */
.sendResultBtn {
  position: fixed;
  bottom: 90px;
  left: 50%;
  transform: translateX(-50%);
  font-family: 'Orbitron', monospace;
  font-size: 12px;
  letter-spacing: 2px;
  padding: 14px 28px;
  border-radius: 12px;
  background: linear-gradient(135deg, #001a0a, #002a12);
  color: var(--green);
  border: 1px solid rgba(0,255,157,0.25);
  box-shadow: 0 0 24px rgba(0,255,157,0.2);
  display: none;
  z-index: 50;
  cursor: pointer;
  transition: box-shadow .2s;
  white-space: nowrap;
}

.sendResultBtn:hover { box-shadow: 0 0 36px rgba(0,255,157,0.35); }
.sendResultBtn:disabled { opacity: 0.5; cursor: not-allowed; }
</style>
</head>
<body>

<!-- BACKGROUND -->
<div class="bg-energy"></div>
<div id="screenReset" class="screenReset"></div>

<!-- TOP MENU -->
<div id="topbar" class="topbar">
  <button onclick="toggleFullscreen()">⛶ FULL</button>
  <button onclick="rotateScreen()">⟳ ROTATE</button>
  <button onclick="changeWin()">WIN: <span id="winScore">7</span></button>
  <button onclick="revert()">↩ REVERT</button>
</div>

<!-- WAKE BUTTON -->
<div id="wakeBtn" class="wakeBtn">
  ⏰
  <svg viewBox="0 0 56 56">
    <circle cx="28" cy="28" r="26"></circle>
  </svg>
</div>

<!-- MENU TOGGLE -->
<button class="menuToggle" id="menuToggle">☰</button>

<!-- LEFT PLAYER -->
<div id="left" class="player left">
  <div class="scanBtn" id="scanBtn1" onclick="scanPlayer(1)">📷</div>
  <div id="player1Info" class="playerInfo"></div>
  <div id="score1" class="score" onclick="subtractScore(1)">0</div>
</div>

<!-- CENTER DRAG BUTTONS -->
<div class="center">
  <div class="dragBtn" data-points="3">+3 XTREME</div>
  <div class="dragWrapper">
    <div class="arrow leftArrow">‹</div>
    <div class="dragBtn" data-points="2" id="hintBtn">+2</div>
    <div class="arrow rightArrow">›</div>
  </div>
  <div class="dragBtn" data-points="1">+1</div>
</div>

<!-- RIGHT PLAYER -->
<div id="right" class="player right">
  <div class="scanBtn" id="scanBtn2" onclick="scanPlayer(2)">📷</div>
  <div id="player2Info" class="playerInfo"></div>
  <div id="score2" class="score" onclick="subtractScore(2)">0</div>
</div>

<!-- RESET BUTTON -->
<div class="resetBtn" id="resetBtn">✕</div>

<!-- WIN OVERLAY -->
<div id="overlay" class="overlay">
  <div class="overlay-text" id="overlayText"></div>
</div>

<!-- SEND RESULT BUTTON -->
<button class="sendResultBtn" id="sendResultBtn" onclick="sendResult()">
  ✓ ODESLAT VÝSLEDEK
</button>

<!-- QR OVERLAY -->
<div id="qrOverlay" class="qrOverlay hidden">
  <div class="qr-label">📷 SKENOVÁNÍ QR</div>
  <div id="qrReader"></div>
  <div id="qrResult" class="qrResult">Naskenuj QR kód hráče…</div>
  <div class="qr-actions">
    <button class="qr-btn confirm" onclick="confirmQR()">✓ POTVRDIT</button>
    <button class="qr-btn cancel"  onclick="closeQR()">✕ ZAVŘÍT</button>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════
const API = "https://script.google.com/macros/s/AKfycbzO8rgTmgJ55LUsDcP7lu2qXhA3Gt7IuLHYrjjiI06aHcxD2Lp7bP1gTcsNw3EtmgBt/exec"
// ═══════════════════════════════════════════════

/* ── STATE ── */
let score1 = 0, score2 = 0, winScore = 7
let history = []
let firstScoreUsed = false
let player1Name = "", player2Name = ""
let resultSent = false
let isLandscape = false
let wakeActive = false
let cooldownTime = 30
let cooldownTimeout = null
let holdTimer = null

/* ── ELEMENTS ── */
const s1          = document.getElementById("score1")
const s2          = document.getElementById("score2")
const left        = document.getElementById("left")
const right       = document.getElementById("right")
const topbar      = document.getElementById("topbar")
const resetScreen = document.getElementById("screenReset")
const overlay     = document.getElementById("overlay")
const overlayText = document.getElementById("overlayText")
const wakeBtn     = document.getElementById("wakeBtn")
const circle      = wakeBtn.querySelector("circle")
const resetBtn    = document.getElementById("resetBtn")

/* ══════════════════════════════════════════════
   SCORE
══════════════════════════════════════════════ */
function addScore(p, pts) {
  history.push({ p, pts })

  if (!firstScoreUsed) {
    firstScoreUsed = true
    document.querySelectorAll(".arrow").forEach(a => a.classList.add("hidden"))
  }

  if (p === 1) { score1 += pts; s1.innerText = score1 }
  if (p === 2) { score2 += pts; s2.innerText = score2 }

  if (pts === 3) showOverlay("XTREME FINISH", "xtreme")
  if (score1 >= winScore) showOverlay(player1Name ? player1Name + " WINS" : "LEVÝ VÍTĚZ", "win")
  if (score2 >= winScore) showOverlay(player2Name ? player2Name + " WINS" : "PRAVÝ VÍTĚZ", "win")

  if (pts > 0) startCooldown()
  updateSendResultButton()
}

function subtractScore(p) {
  if (p === 1 && score1 > 0) addScore(1, -1)
  if (p === 2 && score2 > 0) addScore(2, -1)
}

function revert() {
  const h = history.pop()
  if (!h) return
  if (h.p === 1) { score1 -= h.pts; s1.innerText = score1 }
  if (h.p === 2) { score2 -= h.pts; s2.innerText = score2 }
}

function changeWin() {
  const val = prompt("Počet bodů pro vítězství:", winScore)
  if (val !== null && !isNaN(val) && val > 0) {
    winScore = parseInt(val)
    document.getElementById("winScore").innerText = winScore
  }
}

/* ══════════════════════════════════════════════
   OVERLAY
══════════════════════════════════════════════ */
function showOverlay(text, cls) {
  overlayText.innerText = text
  overlay.className = "overlay show " + cls
  setTimeout(() => overlay.className = "overlay", 1400)
}

/* ══════════════════════════════════════════════
   RESET
══════════════════════════════════════════════ */
function resetScore() {
  score1 = score2 = 0
  history = []
  firstScoreUsed = false
  resultSent = false

  s1.innerText = "0"
  s2.innerText = "0"

  document.querySelectorAll(".arrow").forEach(a => a.classList.remove("hidden"))
  resetPlayersInfo()
  startCooldown()
  updateSendResultButton()
}

function resetPlayersInfo() {
  player1Name = ""
  player2Name = ""

  ;["player1Info", "player2Info"].forEach(id => {
    const el = document.getElementById(id)
    el.innerHTML = ""
    el.className = "playerInfo"
  })

  document.querySelectorAll(".scanBtn").forEach(btn => {
    btn.classList.remove("hidden")
  })
}

/* DRAG RESET */
let rx = 0, ry = 0, dragReset = false
resetBtn.addEventListener("pointerdown", e => { dragReset = true; rx = e.clientX; ry = e.clientY })
resetBtn.addEventListener("pointermove", e => {
  if (!dragReset) return
  const dx = e.clientX - rx, dy = e.clientY - ry
  resetBtn.style.transform = `translate(${dx}px,${dy}px)`
  resetScreen.classList.toggle("active", dx > 80 || dy < -80)
})
resetBtn.addEventListener("pointerup", () => {
  resetBtn.style.transform = ""
  if (resetScreen.classList.contains("active")) resetScore()
  resetScreen.classList.remove("active")
  dragReset = false
})

/* ══════════════════════════════════════════════
   DRAG SCORE BUTTONS
══════════════════════════════════════════════ */
document.querySelectorAll(".dragBtn").forEach(b => {
  let sx = 0, dx = 0, dragging = false

  b.addEventListener("pointerdown", e => {
    dragging = true
    sx = e.clientX
    b.classList.add("active")
    b.setPointerCapture(e.pointerId)
  })

  b.addEventListener("pointermove", e => {
    if (!dragging) return
    dx = e.clientX - sx
    b.style.transform = `translateX(${dx}px)`
    left.classList.toggle("active",  dx < -80)
    right.classList.toggle("active", dx > 80)
  })

  b.addEventListener("pointerup", () => {
    b.style.transform = ""
    b.classList.remove("active")
    left.classList.remove("active")
    right.classList.remove("active")
    if (dx < -120) addScore(1, +b.dataset.points)
    if (dx > 120)  addScore(2, +b.dataset.points)
    dragging = false; dx = 0
  })
})

/* ══════════════════════════════════════════════
   WAKE BUTTON
══════════════════════════════════════════════ */
wakeBtn.addEventListener("pointerdown", () => {
  holdTimer = setTimeout(() => {
    const val = prompt("Cooldown v sekundách:", cooldownTime)
    if (val !== null && !isNaN(val) && val > 0) cooldownTime = parseInt(val)
  }, 2500)
})

wakeBtn.addEventListener("pointerup", () => {
  clearTimeout(holdTimer)
  if (!wakeActive) {
    wakeActive = true
    wakeBtn.classList.add("active-wake")
  }
  startCooldown()
})

wakeBtn.addEventListener("pointerleave", () => clearTimeout(holdTimer))

function startCooldown() {
  if (!wakeActive) return
  if (cooldownTimeout) clearTimeout(cooldownTimeout)

  wakeBtn.classList.add("cooldown")
  circle.style.transition = "none"
  circle.style.strokeDashoffset = "163"

  setTimeout(() => {
    circle.style.transition = `stroke-dashoffset ${cooldownTime}s linear`
    circle.style.strokeDashoffset = "0"
  }, 50)

  cooldownTimeout = setTimeout(() => {
    wakeBtn.classList.remove("cooldown")
    circle.style.transition = "none"
    circle.style.strokeDashoffset = "163"
  }, cooldownTime * 1000)
}

function updateWakeBtnPosition() {
  wakeBtn.style.top = topbar.classList.contains("hidden")
    ? "20px"
    : (topbar.offsetHeight + 10) + "px"
}

updateWakeBtnPosition()
window.addEventListener("resize", updateWakeBtnPosition)

/* ══════════════════════════════════════════════
   MENU
══════════════════════════════════════════════ */
const menuBtn = document.getElementById("menuToggle")
let menuHoldTimer = null
let scanVisible = false

menuBtn.addEventListener("pointerdown", () => {
  menuHoldTimer = setTimeout(() => toggleScanButtons(), 2500)
})
menuBtn.addEventListener("pointerup", () => {
  clearTimeout(menuHoldTimer)
  toggleMenu()
})
menuBtn.addEventListener("pointerleave", () => clearTimeout(menuHoldTimer))

function toggleMenu() {
  topbar.classList.toggle("hidden")
  updateWakeBtnPosition()
}

function toggleScanButtons() {
  scanVisible = !scanVisible
  document.querySelectorAll(".scanBtn").forEach(btn => {
    btn.classList.toggle("visible", scanVisible)
  })
}

async function toggleFullscreen() {
  if (!document.fullscreenElement) {
    await document.documentElement.requestFullscreen()
    topbar.classList.add("hidden")
    updateWakeBtnPosition()
    try { await screen.orientation.lock("landscape"); isLandscape = true } catch(e) {}
  } else {
    document.exitFullscreen()
  }
}

async function rotateScreen() {
  if (!document.fullscreenElement) return alert("Jen ve fullscreen")
  await screen.orientation.lock(isLandscape ? "portrait" : "landscape")
  isLandscape = !isLandscape
}

/* ══════════════════════════════════════════════
   QR SCAN
══════════════════════════════════════════════ */
let currentPlayer = null
let qrScanner = null
let scannedQRText = ""

function scanPlayer(p) {
  currentPlayer = p
  scannedQRText = ""
  document.getElementById("qrResult").innerText = "Naskenuj QR kód hráče…"
  document.getElementById("qrOverlay").classList.remove("hidden")

  qrScanner = new Html5Qrcode("qrReader")
  qrScanner.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: 250 },
    txt => {
      scannedQRText = txt
      document.getElementById("qrResult").innerText = txt
      qrScanner.stop()
    }
  )
}

function confirmQR() {
  if (!scannedQRText) return alert("Žádná data – naskenuj QR kód")
  parseQR(currentPlayer, scannedQRText)
  closeQR()
}

function parseQR(player, text) {
  const nick = text.match(/Nick\s*[:\-]?\s*(.+)/i)
  const b1   = text.match(/Beyblade 1\s*[:\-]?\s*(.+)/i)
  const b2   = text.match(/Beyblade 2\s*[:\-]?\s*(.+)/i)
  const b3   = text.match(/Beyblade 3\s*[:\-]?\s*(.+)/i)

  const nickVal = nick ? nick[1].trim() : ""
  if (player === 1) player1Name = nickVal
  if (player === 2) player2Name = nickVal

  let html = ""
  if (nickVal) html += `<div class="nick">${nickVal}</div>`
  ;[b1, b2, b3].forEach(b => {
    if (b) html += `<div class="bey">${b[1].trim()}</div>`
  })

  const scanBtn = document.getElementById(player === 1 ? "scanBtn1" : "scanBtn2")
  if (scanBtn) scanBtn.classList.add("hidden")

  const infoEl = document.getElementById(player === 1 ? "player1Info" : "player2Info")
  infoEl.className = "playerInfo " + (player === 1 ? "leftAlign" : "rightAlign")
  infoEl.innerHTML = html

  updateSendResultButton()
}

function closeQR() {
  document.getElementById("qrOverlay").classList.add("hidden")
  if (qrScanner) { qrScanner.stop().catch(() => {}); qrScanner = null }
}

/* ══════════════════════════════════════════════
   SEND RESULT
══════════════════════════════════════════════ */
function updateSendResultButton() {
  const btn = document.getElementById("sendResultBtn")
  const canSend = player1Name && player2Name &&
    (score1 >= winScore || score2 >= winScore) &&
    !resultSent

  btn.style.display = canSend ? "block" : "none"
  btn.disabled = !canSend
}

function sendResult() {
  const btn = document.getElementById("sendResultBtn")
  btn.disabled = true
  btn.innerText = "⟳ ODESÍLÁM…"

  fetch(API, {
    method: "POST",
    mode: "no-cors",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      type: "result",
      player1: player1Name,
      score1,
      player2: player2Name,
      score2,
      time: new Date().toISOString()
    })
  }).finally(() => {
    resultSent = true
    btn.style.display = "none"
    showOverlay("ODESLÁNO ✓", "win")
    updateSendResultButton()
  })
}
